name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Capacitor
        run: npm install

      - name: Gerar projeto Android
        run: npx cap add android

      - name: Ícones e splash
        run: npx capacitor-assets generate --android
        continue-on-error: true

      - name: Sync
        run: npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Renomear APK
        run: |
          NAME="electric-budget-${GITHUB_REF_NAME}.apk"
          [ "${GITHUB_REF_NAME}" = "" ] && NAME="electric-budget.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$NAME"
          echo "APK_NAME=$NAME" >> "$GITHUB_ENV"

      - name: Upload artifact (sempre)
        uses: actions/upload-artifact@v4
        with:
          name: electric-budget-apk
          path: ${{ env.APK_NAME }}

      - name: Publicar Release (só em tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          body: |
            ## Electric Budget — ${{ github.ref_name }}

            APK Android (assinado com chave de debug, para instalação direta).

            **Instalar no celular:**
            1. Baixe o `.apk` abaixo
            2. Abra o arquivo no aparelho
            3. Autorize "instalar de fontes desconhecidas" quando pedido
            4. Abra pelo ícone ⚡

            App offline-first: funciona sem internet após o primeiro uso.
            Também disponível como PWA: https://erik-gastao.github.io/ElectricBudgetApp/
